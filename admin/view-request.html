<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Request - Church Admin</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>⛪ Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
                <a href="ministry-requests.html" class="nav-link active">📋 Ministry Requests</a>
                <a href="manage-ministries.html" class="nav-link">⛪ Ministries</a>
                <a href="messages.html" class="nav-link">📨 Messages</a>
                <a href="index.html" class="nav-link logout" onclick="logout()">🚪 Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Request Details</h1>
                <a href="ministry-requests.html" class="btn-secondary">← Back</a>
            </header>

            <div class="content-section">
                <div class="request-details" id="requestDetails">
                    <p class="loading">Loading request...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'index.html';
        }

        function loadRequest() {
            const requestId = localStorage.getItem('viewRequestId');
            const requests = JSON.parse(localStorage.getItem('ministryRequests')) || [];
            const request = requests.find(r => r.id === requestId);

            const detailsDiv = document.getElementById('requestDetails');

            if (!request) {
                detailsDiv.innerHTML = '<p class="error-message">Request not found</p>';
                return;
            }

            detailsDiv.innerHTML = `
                <div class="detail-card">
                    <h2>Ministry Request Details</h2>
                    
                    <div class="detail-row">
                        <label>Name:</label>
                        <span>${request.name}</span>
                    </div>

                    <div class="detail-row">
                        <label>Email:</label>
                        <span>${request.email}</span>
                    </div>

                    <div class="detail-row">
                        <label>Phone:</label>
                        <span>${request.phone}</span>
                    </div>

                    <div class="detail-row">
                        <label>Ministry:</label>
                        <span>${request.ministry}</span>
                    </div>

                    <div class="detail-row">
                        <label>Experience/Skills:</label>
                        <span>${request.experience}</span>
                    </div>

                    <div class="detail-row">
                        <label>Status:</label>
                        <span class="status-badge status-${(request.status || 'Pending').toLowerCase().replace(' ', '-')}">${request.status || 'Pending'}</span>
                    </div>

                    <div class="detail-row">
                        <label>Date Submitted:</label>
                        <span>${request.dateSubmitted || 'N/A'}</span>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-primary" onclick="contactMember('${request.email}')">📧 Contact Member</button>
                        <button class="btn-danger" onclick="deleteAndReturn('${request.id}')">Delete Request</button>
                    </div>
                </div>
            `;
        }

        function contactMember(email) {
            window.location.href = `mailto:${email}?subject=Church Ministry Request Response`;
        }

        function deleteAndReturn(id) {
            if (confirm('Are you sure you want to delete this request?')) {
                let requests = JSON.parse(localStorage.getItem('ministryRequests')) || [];
                requests = requests.filter(r => r.id !== id);
                localStorage.setItem('ministryRequests', JSON.stringify(requests));
                window.location.href = 'ministry-requests.html';
            }
        }

        loadRequest();
    </script>
</body>
</html>
