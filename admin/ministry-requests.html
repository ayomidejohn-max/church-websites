<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministry Requests - Church Admin</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>⛪ Admin Panel</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">🏠 Dashboard</a>
                <a href="ministry-requests.html" class="nav-link active">📋 Ministry Requests</a>
                <a href="manage-ministry.html" class="nav-link">⛪ Ministries</a>
                <a href="messages.html" class="nav-link">📨 Messages</a>
                <a href="index.html" class="nav-link logout" onclick="logout()">🚪 Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Ministry Requests</h1>
            </header>

            <div class="content-section">
                <!-- Filter & Search -->
                <div class="filter-section">
                    <input type="text" id="searchInput" placeholder="Search by name or email..." class="search-box">
                    <select id="ministryFilter" class="filter-select">
                        <option value="">All Ministries</option>
                        <option value="Children Ministry">Children Ministry</option>
                        <option value="Youth Ministry">Youth Ministry</option>
                        <option value="Outreach Ministry">Outreach Ministry</option>
                    </select>
                    <select id="statusFilter" class="filter-select">
                        <option value="">All Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Joined Ministry">Joined Ministry</option>
                    </select>
                </div>

                <!-- Requests Table -->
                <div class="table-wrapper">
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Ministry</th>
                                <th>Experience</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTableBody">
                            <tr>
                                <td colspan="7" class="no-data">No requests found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for updating status -->
    <div id="statusModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Update Request Status</h2>
            <select id="statusSelect" class="filter-select">
                <option value="Pending">Pending</option>
                <option value="Contacted">Contacted</option>
                <option value="Joined Ministry">Joined Ministry</option>
            </select>
            <button class="btn-primary" onclick="saveStatus()">Save Status</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (!localStorage.getItem('adminLoggedIn')) {
            window.location.href = 'index.html';
        }

        let currentEditId = null;

        function loadRequests() {
            const requests = JSON.parse(localStorage.getItem('ministryRequests')) || [];
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const ministryFilter = document.getElementById('ministryFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            let filtered = requests.filter(req => {
                const matchSearch = req.name.toLowerCase().includes(searchTerm) || 
                                   req.email.toLowerCase().includes(searchTerm);
                const matchMinistry = !ministryFilter || req.ministry === ministryFilter;
                const matchStatus = !statusFilter || req.status === statusFilter;
                return matchSearch && matchMinistry && matchStatus;
            });

            const tbody = document.getElementById('requestsTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">No requests found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(req => `
                <tr>
                    <td>${req.name}</td>
                    <td>${req.email}</td>
                    <td>${req.phone}</td>
                    <td>${req.ministry}</td>
                    <td>${req.experience.substring(0, 30)}...</td>
                    <td><span class="status-badge status-${req.status.toLowerCase().replace(' ', '-')}">${req.status || 'Pending'}</span></td>
                    <td>
                        <button class="btn-small" onclick="viewRequest('${req.id}')">View</button>
                        <button class="btn-small" onclick="updateStatus('${req.id}')">Status</button>
                        <button class="btn-small btn-danger" onclick="deleteRequest('${req.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function viewRequest(id) {
            localStorage.setItem('viewRequestId', id);
            window.location.href = 'view-request.html';
        }

        function updateStatus(id) {
            currentEditId = id;
            const requests = JSON.parse(localStorage.getItem('ministryRequests')) || [];
            const request = requests.find(r => r.id === id);
            document.getElementById('statusSelect').value = request.status || 'Pending';
            document.getElementById('statusModal').style.display = 'block';
        }

        function saveStatus() {
            const status = document.getElementById('statusSelect').value;
            const requests = JSON.parse(localStorage.getItem('ministryRequests')) || [];
            const index = requests.findIndex(r => r.id === currentEditId);
            if (index !== -1) {
                requests[index].status = status;
                localStorage.setItem('ministryRequests', JSON.stringify(requests));
                document.getElementById('statusModal').style.display = 'none';
                loadRequests();
            }
        }

        function deleteRequest(id) {
            if (confirm('Are you sure you want to delete this request?')) {
                let requests = JSON.parse(localStorage.getItem('ministryRequests')) || [];
                requests = requests.filter(r => r.id !== id);
                localStorage.setItem('ministryRequests', JSON.stringify(requests));
                loadRequests();
            }
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('keyup', loadRequests);
        document.getElementById('ministryFilter').addEventListener('change', loadRequests);
        document.getElementById('statusFilter').addEventListener('change', loadRequests);

        // Modal close
        document.querySelector('.close-modal').addEventListener('click', function() {
            document.getElementById('statusModal').style.display = 'none';
        });

        window.addEventListener('click', function(e) {
            const modal = document.getElementById('statusModal');
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        loadRequests();
    </script>
</body>
</html>
